name: Sync Aurora Users

on:
  schedule:
    # New users only — runs every hour
    - cron: '0 * * * *'
    # Full sync — runs every Sunday at 6am UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      sync_type:
        description: 'Sync type'
        required: true
        default: 'new-only'
        type: choice
        options:
          - new-only
          - full

jobs:
  sync-new-users:
    name: Sync new Aurora users
    if: github.event_name == 'workflow_dispatch' && inputs.sync_type == 'new-only' || github.event.schedule == '0 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger new-user sync
        run: |
          curl -s -f -X POST https://aurora-zoho-sync.onrender.com/internal/sync-aurora-users

  full-sync:
    name: Full Aurora users sync
    if: github.event_name == 'workflow_dispatch' && inputs.sync_type == 'full' || github.event.schedule == '0 6 * * 0'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger full sync
        run: |
          curl -s -f -X POST https://aurora-zoho-sync.onrender.com/internal/sync-aurora-users/full
